<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗启长安，智咏征程</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* ==========================================
           样式定义：秦风古韵与视觉呈现
           ========================================== */
        :root {
            --zhu-sha: #c21f30; /* 朱砂红 */
            --xuan-se: #1a1a1a; /* 玄色 */
            --juan-bai: #f9f6f0; /* 绢白 */
            --jin-se: #d4af37;  /* 描金 */
            --an-jin: #8c7322;  /* 暗金 */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "KaiTi", "STKaiti", serif; 
            background-color: var(--xuan-se);
            color: var(--juan-bai);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 纯背景层 - 改为本地背景图 */
        .background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -3;
            background-color: var(--xuan-se);
            background-image: url('./1.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* ==========================================
           背景音乐控制按钮 - 新增样式
           ========================================== */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(26, 26, 26, 0.8);
            border: 2px solid var(--jin-se);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .music-control:hover {
            background: rgba(194, 31, 48, 0.2);
            border-color: var(--zhu-sha);
            box-shadow: 0 0 20px rgba(194, 31, 48, 0.5);
            transform: scale(1.1);
        }

        .music-control.playing {
            animation: rotate 8s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .music-control svg {
            width: 24px;
            height: 24px;
            fill: var(--jin-se);
            transition: fill 0.3s ease;
        }

        .music-control:hover svg {
            fill: var(--zhu-sha);
        }

        .music-control.paused svg {
            opacity: 0.6;
        }

        /* 音乐提示文字 */
        .music-hint {
            position: fixed;
            top: 75px;
            right: 20px;
            font-size: 0.8rem;
            color: var(--jin-se);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 999;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 3px;
        }

        .music-hint.show {
            opacity: 0.8;
        }

        #posterArea {
            padding: 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        .container {
            position: relative;
            width: 80vw;
            max-width: 1000px;
            height: 70vh;
            display: flex;
            flex-direction: row-reverse; 
            justify-content: space-between;
            align-items: center;
            background: rgba(26, 26, 26, 0.65);
            border: 1px solid var(--zhu-sha);
            box-shadow: 0 0 30px rgba(194, 31, 48, 0.3);
            padding: 40px;
            backdrop-filter: blur(8px);
        }

        .interaction-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
            text-align: right;
            z-index: 10;
        }

        h1 {
            color: var(--zhu-sha);
            font-size: 2.5rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            letter-spacing: 4px;
        }

        p.subtitle {
            color: var(--jin-se);
            font-size: 1.1rem;
            margin-top: -10px;
            margin-bottom: 10px;
        }

        .select-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        select, input[type="text"] {
            padding: 12px;
            font-size: 1.1rem;
            font-family: inherit;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--jin-se);
            color: var(--juan-bai);
            outline: none;
            transition: box-shadow 0.3s ease;
            box-sizing: border-box;
        }

        select {
            cursor: pointer;
            flex: 1;
            appearance: none;
            text-align: center;
        }

        select option {
            background-color: var(--xuan-se);
            color: var(--juan-bai);
        }

        input[type="text"]:focus, select:focus {
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        button {
            padding: 12px 20px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
            background-color: var(--zhu-sha);
            color: var(--juan-bai);
            border: 1px solid var(--zhu-sha);
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        button:hover:not(:disabled) {
            background-color: #a01725;
            box-shadow: 0 0 15px var(--zhu-sha);
        }

        button:disabled {
            background-color: #555;
            border-color: #555;
            cursor: not-allowed;
            color: #ccc;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--jin-se);
            color: var(--jin-se);
            font-size: 1rem;
            padding: 8px 15px;
        }

        .btn-secondary:hover {
            background-color: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 5px;
        }

        .poetry-display {
            writing-mode: vertical-rl; 
            text-orientation: upright;
            font-size: 2.2rem;
            line-height: 2;
            height: 100%;
            color: var(--juan-bai);
            letter-spacing: 5px;
            text-shadow: 2px 2px 4px #000;
            white-space: pre-wrap;
        }

        .cursor {
            display: inline-block;
            width: 1em;
            height: 2px;
            background-color: var(--jin-se);
            animation: blink 1s step-end infinite;
            margin-top: 10px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* ==========================================
           赏析弹窗与游侠留墨抽屉
           ========================================== */
        .analysis-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 40px;
            box-sizing: border-box;
            border: 1px solid var(--jin-se);
        }

        .analysis-content {
            font-size: 1.4rem;
            line-height: 1.8;
            color: var(--jin-se);
            max-width: 80%;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px #000;
        }

        .history-drawer {
            position: fixed;
            top: 0;
            right: -350px;
            width: 300px;
            height: 100vh;
            background: rgba(26, 26, 26, 0.95);
            border-left: 2px solid var(--an-jin);
            z-index: 200;
            transition: right 0.4s ease;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            box-shadow: -5px 0 15px rgba(0,0,0,0.8);
        }

        .history-drawer.open { right: 0; }

        .history-drawer h2 {
            color: var(--jin-se);
            border-bottom: 1px dashed var(--jin-se);
            padding-bottom: 10px;
            text-align: center;
        }

        .history-item {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #444;
            background: rgba(0,0,0,0.5);
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .history-item:hover { border-color: var(--zhu-sha); }
        .history-title { color: var(--zhu-sha); font-weight: bold; margin-bottom: 5px;}
        .history-preview { font-size: 0.9rem; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

        .close-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: none;
            border: none;
            color: var(--juan-bai);
            font-size: 1.5rem;
            padding: 0;
            cursor: pointer;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 背景音乐控制按钮 -->
    <div class="music-control paused" id="musicControl" onclick="toggleMusic()" title="点击播放/暂停背景音乐">
        <svg viewBox="0 0 24 24" id="musicIcon">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
    </div>
    <div class="music-hint" id="musicHint">雅乐</div>

    <audio id="bgMusic" loop preload="auto">
        <source src="./1.mp3" type="audio/mpeg">
        您的浏览器不支持音频播放。
    </audio>

    <div class="background-layer" id="bgLayer"></div>

    <div id="posterArea">
        <div class="container" id="mainContainer">
            <div class="interaction-area" id="controlsArea">
                <h1>诗启长安</h1>
                <p class="subtitle">AI 赋能 · 智咏征程</p>

                <div class="select-group">
                    <select id="genreSelect">
                        <option value="七言绝句">七言绝句</option>
                        <option value="五言绝句">五言绝句</option>
                        <option value="七言律诗">七言律诗</option>
                        <option value="水调歌头">词牌·水调歌头</option>
                        <option value="西江月">词牌·西江月</option>
                    </select>
                    <select id="styleSelect">
                        <option value="豪迈磅礴">豪迈磅礴</option>
                        <option value="婉约唯美">婉约唯美</option>
                        <option value="苍凉悲壮">苍凉悲壮</option>
                        <option value="空灵禅意">空灵禅意</option>
                        <option value="思乡情切">思乡情切</option>
                    </select>
                </div>

                <input type="text" id="keywordInput" placeholder="输入长安意象 (如: 大雁塔)">
                <button id="generateBtn" onclick="generateContent()">智咏长安</button>

                <div class="action-buttons">
                    <button class="btn-secondary hidden" id="analysisBtn" onclick="toggleAnalysis()">诗意解签</button>
                    <button class="btn-secondary hidden" id="posterBtn" onclick="exportPoster()">生成海报</button>
                    <button class="btn-secondary" onclick="toggleHistory()">游侠留墨</button>
                </div>
            </div>

            <div class="poetry-display" id="poetryOutput">
                待客入长安，<br>落笔生云烟。
            </div>

            <div class="analysis-modal" id="analysisModal">
                <div class="analysis-content" id="analysisContent"></div>
                <button class="btn-secondary" onclick="toggleAnalysis()">收起卷轴</button>
            </div>
        </div>
    </div>

    <div class="history-drawer" id="historyDrawer">
        <button class="close-btn" onclick="toggleHistory()">×</button>
        <h2>游侠留墨</h2>
        <div id="historyList"></div>
    </div>

    <script>
        /* ==========================================
           1. 背景音乐控制
           ========================================== */
        const bgMusic = document.getElementById('bgMusic');
        const musicControl = document.getElementById('musicControl');
        const musicHint = document.getElementById('musicHint');
        const musicIcon = document.getElementById('musicIcon');

        // 图标路径
        const ICON_PLAY = "M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z";
        const ICON_PAUSE = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

        // 初始化音量
        bgMusic.volume = 0.4; 
        
        // 页面加载后尝试自动播放（需要用户交互）
        let musicPlayed = false;

        // 全局 toggleMusic 函数
        window.toggleMusic = function() {
            if (bgMusic.paused) {
                bgMusic.play().then(() => {
                    musicControl.classList.remove('paused');
                    musicControl.classList.add('playing');
                    const path = musicIcon.querySelector('path');
                    if (path) path.setAttribute('d', ICON_PAUSE);
                    showHint('雅乐已启');
                    musicPlayed = true;
                }).catch(err => {
                    console.error('播放失败:', err);
                    showHint('请点击页面任意处');
                });
            } else {
                bgMusic.pause();
                musicControl.classList.remove('playing');
                musicControl.classList.add('paused');
                const path = musicIcon.querySelector('path');
                if (path) path.setAttribute('d', ICON_PLAY);
                showHint('雅乐已停');
                musicPlayed = false;
            }
        };

        function showHint(text) {
            musicHint.textContent = text;
            musicHint.classList.add('show');
            setTimeout(() => {
                musicHint.classList.remove('show');
            }, 2000);
        }

        // 用户首次点击页面任意位置时尝试播放音乐（解决浏览器自动播放策略）
        function tryAutoPlayOnInteraction() {
            if (!musicPlayed && bgMusic.paused) {
                bgMusic.play().then(() => {
                    musicControl.classList.remove('paused');
                    musicControl.classList.add('playing');
                    const path = musicIcon.querySelector('path');
                    if (path) path.setAttribute('d', ICON_PAUSE);
                    showHint('雅乐已启');
                    musicPlayed = true;
                }).catch(() => {});
            }
        }

        // 页面加载后的友好提示
        window.addEventListener('load', () => {
            setTimeout(() => {
                showHint('点击右上角开启雅乐');
            }, 1500);
            
            // 监听用户交互
            document.body.addEventListener('click', tryAutoPlayOnInteraction);
            document.body.addEventListener('touchstart', tryAutoPlayOnInteraction);
        });

        /* ==========================================
           2. AI 文本接口配置区域
           ========================================== */
        const TEXT_API_KEY = '10f8cb84a6fe4f88941c205118151980.cOmaBThvE07AS0Od'; 
        const TEXT_API_URL = 'https://open.bigmodel.cn/api/paas/v4/chat/completions'; 
        const TEXT_MODEL = 'glm-4.6v-flashx';

        // 状态追踪
        let currentAnalysis = ""; 
        let currentPoetry = "";   

        window.onload = function() {
            loadHistory();
        };

        async function generateContent() {
            const keyword = document.getElementById('keywordInput').value.trim();
            const genre = document.getElementById('genreSelect').value;
            const style = document.getElementById('styleSelect').value;
            const outputArea = document.getElementById('poetryOutput');
            const btn = document.getElementById('generateBtn');
            const analysisBtn = document.getElementById('analysisBtn');
            const posterBtn = document.getElementById('posterBtn');

            if (!keyword) {
                alert("请赐教长安意象（输入关键词）！");
                return;
            }

            btn.innerText = "挥毫中...";
            btn.disabled = true;
            analysisBtn.classList.add('hidden');
            posterBtn.classList.add('hidden');
            outputArea.innerHTML = '<span class="cursor"></span>';
            currentAnalysis = "";

            await generatePoetry(keyword, genre, style, outputArea, btn, analysisBtn, posterBtn);
        }

        async function generatePoetry(keyword, genre, style, outputArea, btn, analysisBtn, posterBtn) {
            const systemPrompt = `你是一位才华横溢的大唐诗人。请根据用户提供的关键词、体裁和风格进行创作。
要求：
1. 意象需紧扣"长安文脉"与"陕西特色"，并将用户提供的关键词自然融入诗意之中。
2. 核心要求：切忌每首诗都以"长安"二字开篇！起句必须灵动多样，可从写景（如风、月、雨、雪）、状物、抒情或咏史等不同角度巧妙切入，避免生搬硬套。
3. 语言需严格符合所选古诗词格律与平仄，意境深远，用词要高雅凝练。
4. 必须严格以 JSON 格式返回，包含两个字段："poetry" (诗歌正文，保留换行符\n) 和 "analysis" (现代白话文赏析，50-80字)。只输出 JSON，绝不要输出其他废话。`;

            const userPrompt = `关键词：${keyword}；体裁：${genre}；风格：${style}`;

            try {
                const response = await fetch(TEXT_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${TEXT_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: TEXT_MODEL, 
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userPrompt }
                        ],
                        temperature: 0.85,
                        response_format: { type: "json_object" } 
                    })
                });

                if (!response.ok) throw new Error('文本API失败');
                const data = await response.json();
                let contentString = data.choices[0].message.content;

                contentString = contentString.replace(/```json/gi, '').replace(/```/gi, '').trim();
                const parsedData = JSON.parse(contentString);

                currentPoetry = parsedData.poetry;
                currentAnalysis = parsedData.analysis;

                typeWriterEffect(currentPoetry, outputArea, () => {
                    btn.innerText = "智咏长安";
                    btn.disabled = false;
                    analysisBtn.classList.remove('hidden');
                    posterBtn.classList.remove('hidden');
                    saveToHistory(keyword, genre, style, currentPoetry, currentAnalysis);
                });

            } catch (error) {
                console.error(error);
                outputArea.innerHTML = "风烟迷眼，<br>墨迹难寻。<br>（文本API调用失败）";
                btn.innerText = "智咏长安";
                btn.disabled = false;
            }
        }

        function typeWriterEffect(text, element, callback) {
            element.innerHTML = '';
            let i = 0;
            // 修复：正确处理换行符
            const lines = text.split('\n');
            let currentLine = 0;
            let charIndex = 0;
            
            function typeNextChar() {
                if (currentLine >= lines.length) {
                    if (callback) callback();
                    return;
                }
                
                const currentText = lines[currentLine];
                if (charIndex === 0 && currentLine > 0) {
                    element.innerHTML += '<br>';
                }
                
                if (charIndex < currentText.length) {
                    element.innerHTML += currentText[charIndex];
                    charIndex++;
                    setTimeout(typeNextChar, 100);
                } else {
                    currentLine++;
                    charIndex = 0;
                    setTimeout(typeNextChar, 100);
                }
            }
            
            typeNextChar();
        }

        /* ==========================================
           3. 交互与导出
           ========================================== */
        function toggleAnalysis() {
            const modal = document.getElementById('analysisModal');
            const content = document.getElementById('analysisContent');
            if (modal.style.display === 'flex') {
                modal.style.display = 'none';
            } else {
                content.innerText = currentAnalysis;
                modal.style.display = 'flex';
            }
        }

        function exportPoster() {
            const container = document.getElementById('mainContainer');
            const controls = document.getElementById('controlsArea');
            const btn = document.getElementById('posterBtn');

            const originalBorder = container.style.border;
            const originalBoxShadow = container.style.boxShadow;
            const originalBg = container.style.background;

            controls.style.display = 'none';
            container.style.border = 'none';
            container.style.boxShadow = 'none';
            container.style.background = 'rgba(26, 26, 26, 0.2)'; 
            btn.innerText = "绘制中...";

            html2canvas(document.body, {
                backgroundColor: "#1a1a1a",
                scale: 2,
                useCORS: true, 
                allowTaint: true,
                ignoreElements: (element) => element.id === 'historyDrawer' || element.id === 'musicControl' || element.id === 'musicHint'
            }).then(canvas => {
                controls.style.display = 'flex';
                container.style.border = originalBorder;
                container.style.boxShadow = originalBoxShadow;
                container.style.background = originalBg;
                btn.innerText = "生成海报";

                const link = document.createElement('a');
                link.download = `诗启长安_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                console.error("截图失败:", err);
                alert("海报生成失败，请稍后重试！");
                controls.style.display = 'flex';
                container.style.border = originalBorder;
                container.style.boxShadow = originalBoxShadow;
                container.style.background = originalBg;
                btn.innerText = "生成海报";
            });
        }

        function toggleHistory() {
            document.getElementById('historyDrawer').classList.toggle('open');
        }

        // 保存历史 - 修复正则表达式问题
        function saveToHistory(keyword, genre, style, poetry, analysis) {
            let history = JSON.parse(localStorage.getItem('changan_poetry_history')) || [];

            const newItem = {
                id: Date.now(),
                keyword, genre, style, poetry, analysis,
                date: new Date().toLocaleDateString()
            };
            history.unshift(newItem); 
            if (history.length > 20) history.pop(); 
            localStorage.setItem('changan_poetry_history', JSON.stringify(history));
            loadHistory();
        }

        // 加载历史 - 修复正则表达式错误
        function loadHistory() {
            const historyList = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('changan_poetry_history')) || [];

            historyList.innerHTML = '';
            if (history.length === 0) {
                historyList.innerHTML = '<p style="text-align:center; color:#888;">暂无墨宝，快去挥毫吧！</p>';
                return;
            }

            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                // 修复：使用 RegExp 构造函数代替正则字面量
                const previewText = item.poetry.split(new RegExp('[。！？]'))[0] || item.keyword;

                div.innerHTML = `
                    <div class="history-title">意象：${item.keyword} (${item.genre})</div>
                    <div class="history-preview">${previewText}...</div>
                    <div style="font-size: 0.8rem; color: #666; margin-top: 5px; text-align: right;">${item.date}</div>
                `;

                div.onclick = () => {
                    currentPoetry = item.poetry;
                    currentAnalysis = item.analysis;

                    document.getElementById('keywordInput').value = item.keyword;
                    document.getElementById('genreSelect').value = item.genre;
                    document.getElementById('styleSelect').value = item.style;

                    const outputArea = document.getElementById('poetryOutput');
                    outputArea.innerHTML = item.poetry.replace(/([。！？])/g, '$1<br>');

                    document.getElementById('analysisBtn').classList.remove('hidden');
                    document.getElementById('posterBtn').classList.remove('hidden');
                    toggleHistory(); 
                };
                historyList.appendChild(div);
            });
        }
    </script>
</body>
</html>
