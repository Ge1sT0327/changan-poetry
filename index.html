<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>诗启长安，智咏征程</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "KaiTi", "华文楷书", "STKaiti", serif;
            background-color: #1a1a1a;
            color: #f9f6f0;
        }

        /* 背景层 - 优先使用图片，失败则渐变 */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #2c2418 0%, #1a1a1a 100%);
            transition: background-image 0.3s;
        }
        /* 图片背景（如果加载成功会覆盖渐变） */
        .background-layer.has-image {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        /* 半透明遮罩，让文字更清晰 */
        .background-layer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            pointer-events: none;
        }

        #posterArea {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            position: relative;
            width: 90vw;
            max-width: 1300px;
            height: 85vh;
            display: flex;
            flex-direction: row-reverse;
            justify-content: space-between;
            align-items: center;
            background: rgba(26, 26, 26, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid #c21f30;
            border-radius: 16px;
            padding: 30px 40px;
            box-shadow: 0 0 40px rgba(194, 31, 48, 0.3);
        }

        .interaction-area {
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            z-index: 10;
        }

        h1 {
            font-size: 2.8rem;
            color: #c21f30;
            margin: 0;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
            letter-spacing: 6px;
        }

        .subtitle {
            color: #d4af37;
            font-size: 1rem;
            margin-top: -10px;
            letter-spacing: 2px;
        }

        .select-group {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        select, input {
            padding: 10px 14px;
            font-size: 0.95rem;
            font-family: inherit;
            background: rgba(0,0,0,0.6);
            border: 1px solid #d4af37;
            color: #f9f6f0;
            border-radius: 8px;
            outline: none;
        }

        select:focus, input:focus {
            border-color: #c21f30;
            box-shadow: 0 0 8px rgba(194,31,48,0.5);
        }

        select {
            cursor: pointer;
            flex: 1;
        }

        input {
            width: 100%;
        }

        button {
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            background: #c21f30;
            color: #f9f6f0;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 2px;
        }

        button:hover:not(:disabled) {
            background: #a01725;
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(194,31,48,0.4);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .btn-secondary:hover {
            background: rgba(212,175,55,0.2);
            transform: none;
        }

        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 5px;
        }

        .poetry-display {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 1.6rem;
            line-height: 2.2;
            height: 100%;
            color: #f9f6f0;
            text-shadow: 1px 1px 3px #000;
            white-space: pre-wrap;
            overflow-y: auto;
            flex: 1;
            margin-left: 30px;
            letter-spacing: 4px;
        }

        /* 音乐控件 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            border: 2px solid #d4af37;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .music-control:hover {
            transform: scale(1.05);
            border-color: #c21f30;
        }
        .music-control svg {
            width: 28px;
            height: 28px;
            fill: #d4af37;
        }
        .music-control.playing {
            animation: rotate 8s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .music-hint {
            position: fixed;
            top: 82px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #d4af37;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .music-hint.show { opacity: 1; }

        /* 调试信息栏（方便定位问题） */
        .debug-panel {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 9999;
            pointer-events: none;
            max-width: 300px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* 弹窗 */
        .analysis-modal {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 20;
        }
        .analysis-content {
            max-width: 80%;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #d4af37;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 历史抽屉 */
        .history-drawer {
            position: fixed;
            top: 0;
            right: -380px;
            width: 340px;
            height: 100%;
            background: rgba(20,20,20,0.98);
            border-left: 2px solid #8c7322;
            z-index: 200;
            transition: right 0.3s ease;
            padding: 20px;
            overflow-y: auto;
            backdrop-filter: blur(8px);
        }
        .history-drawer.open { right: 0; }
        .history-drawer h2 {
            color: #d4af37;
            text-align: center;
            margin: 30px 0 20px;
            border-bottom: 1px dashed #d4af37;
            padding-bottom: 10px;
        }
        .history-item {
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .history-item:hover {
            border-color: #c21f30;
            background: rgba(194,31,48,0.1);
        }
        .history-title {
            color: #c21f30;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .history-preview {
            font-size: 0.8rem;
            color: #ccc;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            width: auto;
        }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                padding: 20px;
                height: 90vh;
            }
            .interaction-area {
                width: 100%;
                text-align: center;
            }
            .poetry-display {
                writing-mode: horizontal-tb;
                font-size: 1.2rem;
                margin-left: 0;
                margin-top: 20px;
                height: auto;
            }
            .select-group {
                justify-content: center;
            }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- 背景音乐控件 -->
    <div class="music-control paused" id="musicControl" onclick="toggleMusic()">
        <svg viewBox="0 0 24 24">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
    </div>
    <div class="music-hint" id="musicHint">🎵 雅乐</div>

    <!-- 音频：使用本地 mp3，增加 fallback 提示 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="./1.mp3" type="audio/mpeg">
        <!-- 备用在线音乐源，如果本地失败则尝试（可选） -->
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <!-- 背景层：先用渐变，动态加载图片 -->
    <div class="background-layer" id="bgLayer"></div>

    <!-- 调试面板 -->
    <div class="debug-panel" id="debugPanel">初始化中...</div>

    <div id="posterArea">
        <div class="container" id="mainContainer">
            <div class="interaction-area" id="controlsArea">
                <h1>诗启长安</h1>
                <p class="subtitle">AI 赋能 · 智咏征程</p>

                <div class="select-group">
                    <select id="genreSelect">
                        <option value="七言绝句">七言绝句</option>
                        <option value="五言绝句">五言绝句</option>
                        <option value="七言律诗">七言律诗</option>
                        <option value="水调歌头">词牌·水调歌头</option>
                        <option value="西江月">词牌·西江月</option>
                    </select>
                    <select id="styleSelect">
                        <option value="豪迈磅礴">豪迈磅礴</option>
                        <option value="婉约唯美">婉约唯美</option>
                        <option value="苍凉悲壮">苍凉悲壮</option>
                        <option value="空灵禅意">空灵禅意</option>
                        <option value="思乡情切">思乡情切</option>
                    </select>
                </div>

                <input type="text" id="keywordInput" placeholder="输入长安意象 (如: 大雁塔, 曲江流饮)">
                <button id="generateBtn" onclick="generateContent()">🎋 智咏长安</button>

                <div class="action-buttons">
                    <button class="btn-secondary hidden" id="analysisBtn" onclick="toggleAnalysis()">📜 诗意解签</button>
                    <button class="btn-secondary hidden" id="posterBtn" onclick="exportPoster()">🖼️ 生成海报</button>
                    <button class="btn-secondary" onclick="toggleHistory()">📚 游侠留墨</button>
                </div>
            </div>

            <div class="poetry-display" id="poetryOutput">
                待客入长安，<br>落笔生云烟。
            </div>

            <div class="analysis-modal" id="analysisModal">
                <div class="analysis-content" id="analysisContent"></div>
                <button class="btn-secondary" onclick="toggleAnalysis()">收起卷轴</button>
            </div>
        </div>
    </div>

    <div class="history-drawer" id="historyDrawer">
        <button class="close-btn" onclick="toggleHistory()">×</button>
        <h2>📖 游侠留墨</h2>
        <div id="historyList"></div>
    </div>

    <script>
        // ===================== 1. 调试与背景图加载 =====================
        const debugPanel = document.getElementById('debugPanel');
        function logDebug(msg) {
            console.log(msg);
            debugPanel.innerHTML = msg + '<br>' + debugPanel.innerHTML.split('<br>')[0];
        }

        // 尝试加载背景图片
        const bgLayer = document.getElementById('bgLayer');
        const bgImg = new Image();
        bgImg.onload = () => {
            bgLayer.style.backgroundImage = `url('./1.jpg')`;
            bgLayer.classList.add('has-image');
            logDebug('✅ 背景图加载成功: ./1.jpg');
        };
        bgImg.onerror = () => {
            logDebug('❌ 背景图加载失败: ./1.jpg (使用渐变背景)');
            bgLayer.classList.remove('has-image');
        };
        bgImg.src = './1.jpg';

        // ===================== 2. 音乐控制 =====================
        const bgMusic = document.getElementById('bgMusic');
        const musicControl = document.getElementById('musicControl');
        const musicHint = document.getElementById('musicHint');
        const musicIconPath = musicControl.querySelector('svg path');

        const ICON_PLAY = "M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z";
        const ICON_PAUSE = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

        bgMusic.volume = 0.4;
        bgMusic.loop = true;

        let musicPlaying = false;
        let autoPlayTried = false;

        // 检测音乐是否可播放
        bgMusic.addEventListener('canplaythrough', () => {
            logDebug('✅ 音乐文件加载成功，可播放');
        });
        bgMusic.addEventListener('error', (e) => {
            logDebug('❌ 音乐文件加载失败: ./1.mp3 (将尝试备用源或静音)');
            // 可选：显示提示让用户知道音乐无法播放
            showHint('⚠️ 音乐文件未找到，可自行添加 ./1.mp3');
        });

        function showHint(msg) {
            musicHint.textContent = msg;
            musicHint.classList.add('show');
            setTimeout(() => musicHint.classList.remove('show'), 2500);
        }

        function updateUI(playing) {
            if (playing) {
                musicControl.classList.remove('paused');
                musicControl.classList.add('playing');
                musicIconPath.setAttribute('d', ICON_PAUSE);
            } else {
                musicControl.classList.remove('playing');
                musicControl.classList.add('paused');
                musicIconPath.setAttribute('d', ICON_PLAY);
            }
        }

        window.toggleMusic = function(e) {
            if (e) e.stopPropagation();
            if (!bgMusic.paused) {
                bgMusic.pause();
                updateUI(false);
                musicPlaying = false;
                showHint('⏸️ 雅乐已停');
                logDebug('音乐暂停');
            } else {
                bgMusic.play().then(() => {
                    updateUI(true);
                    musicPlaying = true;
                    showHint('🎵 雅乐已启');
                    logDebug('音乐播放中');
                }).catch(err => {
                    logDebug('播放失败: ' + err.message);
                    showHint('👆 请点击页面任意处再试');
                });
            }
        };

        // 用户首次交互时自动尝试播放
        function attemptAutoPlay() {
            if (autoPlayTried) return;
            autoPlayTried = true;
            bgMusic.play().then(() => {
                updateUI(true);
                musicPlaying = true;
                showHint('🎵 雅乐已启');
                logDebug('自动播放成功');
            }).catch(err => {
                logDebug('自动播放被阻止，需用户主动点击');
                showHint('🎵 点击音符开启雅乐');
            });
        }
        document.body.addEventListener('click', attemptAutoPlay, { once: true });
        document.body.addEventListener('touchstart', attemptAutoPlay, { once: true });

        // ===================== 3. AI 配置 =====================
        const TEXT_API_KEY = '10f8cb84a6fe4f88941c205118151980.cOmaBThvE07AS0Od';
        const TEXT_API_URL = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
        const TEXT_MODEL = 'glm-4.6v-flashx';

        let currentPoetry = '';
        let currentAnalysis = '';

        // 历史记录
        function loadHistory() {
            const historyList = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('changan_poetry_history')) || [];
            historyList.innerHTML = '';
            if (history.length === 0) {
                historyList.innerHTML = '<p style="text-align:center; color:#888;">暂无墨宝，快去挥毫吧！</p>';
                return;
            }
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const preview = item.poetry ? item.poetry.split(new RegExp('[。！？]'))[0] : item.keyword;
                div.innerHTML = `
                    <div class="history-title">🏮 ${item.keyword} (${item.genre})</div>
                    <div class="history-preview">${preview}...</div>
                    <div style="font-size:0.7rem; color:#888; margin-top:6px;">${item.date}</div>
                `;
                div.onclick = () => {
                    currentPoetry = item.poetry;
                    currentAnalysis = item.analysis;
                    document.getElementById('keywordInput').value = item.keyword;
                    document.getElementById('genreSelect').value = item.genre;
                    document.getElementById('styleSelect').value = item.style;
                    document.getElementById('poetryOutput').innerHTML = item.poetry.replace(/\n/g, '<br>');
                    document.getElementById('analysisBtn').classList.remove('hidden');
                    document.getElementById('posterBtn').classList.remove('hidden');
                    toggleHistory();
                };
                historyList.appendChild(div);
            });
        }

        function saveToHistory(keyword, genre, style, poetry, analysis) {
            let history = JSON.parse(localStorage.getItem('changan_poetry_history')) || [];
            history.unshift({
                id: Date.now(),
                keyword, genre, style, poetry, analysis,
                date: new Date().toLocaleString()
            });
            if (history.length > 20) history.pop();
            localStorage.setItem('changan_poetry_history', JSON.stringify(history));
            loadHistory();
        }

        async function generateContent() {
            const keyword = document.getElementById('keywordInput').value.trim();
            const genre = document.getElementById('genreSelect').value;
            const style = document.getElementById('styleSelect').value;
            const outputArea = document.getElementById('poetryOutput');
            const genBtn = document.getElementById('generateBtn');
            const analysisBtn = document.getElementById('analysisBtn');
            const posterBtn = document.getElementById('posterBtn');

            if (!keyword) {
                alert('请赐教长安意象（输入关键词）！');
                return;
            }

            genBtn.innerText = '✍️ 挥毫中...';
            genBtn.disabled = true;
            analysisBtn.classList.add('hidden');
            posterBtn.classList.add('hidden');
            outputArea.innerHTML = '<span class="cursor"></span>';
            currentAnalysis = '';

            const systemPrompt = `你是一位才华横溢的大唐诗人。请根据用户提供的关键词、体裁和风格进行创作。
要求：
1. 意象需紧扣"长安文脉"与"陕西特色"，并将用户提供的关键词自然融入诗意之中。
2. 切忌每首诗都以"长安"二字开篇！起句必须灵动多样。
3. 语言需严格符合所选古诗词格律与平仄，意境深远。
4. 必须严格以 JSON 格式返回，包含两个字段："poetry" (诗歌正文，用\\n表示换行) 和 "analysis" (现代白话文赏析，50-80字)。只输出 JSON。`;

            const userPrompt = `关键词：${keyword}；体裁：${genre}；风格：${style}`;

            try {
                const res = await fetch(TEXT_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${TEXT_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: TEXT_MODEL,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userPrompt }
                        ],
                        temperature: 0.85,
                        response_format: { type: 'json_object' }
                    })
                });
                if (!res.ok) throw new Error('API请求失败');
                const data = await res.json();
                let content = data.choices[0].message.content;
                content = content.replace(/```json\s*/gi, '').replace(/```\s*/gi, '').trim();
                const parsed = JSON.parse(content);
                currentPoetry = parsed.poetry;
                currentAnalysis = parsed.analysis;

                outputArea.innerHTML = currentPoetry.replace(/\n/g, '<br>');
                genBtn.innerText = '🎋 智咏长安';
                genBtn.disabled = false;
                analysisBtn.classList.remove('hidden');
                posterBtn.classList.remove('hidden');
                saveToHistory(keyword, genre, style, currentPoetry, currentAnalysis);
            } catch (err) {
                console.error(err);
                outputArea.innerHTML = '风烟迷眼，<br>墨迹难寻。<br>（请检查网络后重试）';
                genBtn.innerText = '🎋 智咏长安';
                genBtn.disabled = false;
            }
        }

        function toggleAnalysis() {
            const modal = document.getElementById('analysisModal');
            const contentDiv = document.getElementById('analysisContent');
            if (modal.style.display === 'flex') {
                modal.style.display = 'none';
            } else {
                contentDiv.innerText = currentAnalysis || '暂无赏析内容';
                modal.style.display = 'flex';
            }
        }

        function exportPoster() {
            const container = document.getElementById('mainContainer');
            const controls = document.getElementById('controlsArea');
            const btn = document.getElementById('posterBtn');
            controls.style.display = 'none';
            btn.innerText = '🎨 绘制中...';
            html2canvas(container, {
                backgroundColor: '#1a1a1a',
                scale: 2,
                useCORS: true,
                logging: false
            }).then(canvas => {
                controls.style.display = 'flex';
                btn.innerText = '🖼️ 生成海报';
                const link = document.createElement('a');
                link.download = `诗启长安_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                console.error(err);
                alert('生成失败，可重试');
                controls.style.display = 'flex';
                btn.innerText = '🖼️ 生成海报';
            });
        }

        function toggleHistory() {
            document.getElementById('historyDrawer').classList.toggle('open');
        }

        // 页面加载完成
        window.addEventListener('load', () => {
            loadHistory();
            setTimeout(() => {
                showHint('🎵 点击右上角音符开启雅乐');
